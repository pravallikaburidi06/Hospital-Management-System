<!DOCTYPE html>
<html>
<head>
<title>Appointments</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<h2>Appointments</h2>

<form id="appointmentForm">

<input
type="text"
id="patientName"

type="text"

Book Appointment

</form>

<div id="appointmentList"></div>

<script src="../js/appointment.js"></script>

</body>
</html>
