<!DOCTYPE html>
<html>
<head>
<title>Doctors</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<h2>Doctors</h2>

<form id="doctorForm">

<input
type="text"
id="name"
placeholder="Doctor Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="text"
id="phone"

<div id="doctorList"></div>

<script src="../js/doctor.js"></script>

</body>
</html>
